server {
	listen 8080 8081 8082 8083;
	server_name localhost;
	root ./srcs/http/Pages;
	index index.html;
	client_max_body_size 100;

	# Chemins type URI (doivent commencer par '/')
	error_page 404 /ErrorPages/404.html;
	error_page 408 /ErrorPages/408.html;

	# Route principale
	location / {
		root ./srcs/http/Pages;
		index index.html;
		allowed_methods GET;
		autoindex off;
	}

	# Uploads (upload_path nécessite POST)
	location /upload {
		root ./srcs/http/Pages;
		allowed_methods POST GET DELETE;
		upload_path ./srcs/http/Pages/upload;
		client_max_body_size 10000000;
		autoindex on;
	}

	location /cgi-bin {
		root ./srcs/http/Pages;
		allowed_methods GET POST;
		cgi_extension .py;
		cgi_path /usr/bin/python3;
		autoindex off;
	}

	location /cgi-bin-php {
		root ./srcs/http/Pages;
		allowed_methods GET POST;
		cgi_extension .php;
		cgi_path /usr/bin/php-cgi;
		autoindex off;
	}

	location /old {
		return /;
	}
}
